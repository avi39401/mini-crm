<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mini-CRM v5</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f18;--surface:#141720;--surface2:#1c2030;--surface3:#242840;
  --border:#2a2f45;--accent:#6c63ff;--accent2:#ff6584;--success:#2ed573;
  --warning:#ffa502;--danger:#ff4757;--text:#e8eaf6;--muted:#6b7499;
  --radius:14px;--nav-h:70px;--header-h:56px;
}
.light{--bg:#f0f2f8;--surface:#fff;--surface2:#f5f6fa;--surface3:#ebedf5;--border:#dde1f0;--text:#1a1d2e;--muted:#8890b0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;overflow:hidden}

/* ── LOCK ── */
#lockScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px;padding:20px}
.lock-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px 28px;text-align:center;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lock-icon{font-size:48px;margin-bottom:12px}
.lock-box h2{font-size:22px;font-weight:900;margin-bottom:4px}
.lock-box p{color:var(--muted);font-size:13px;margin-bottom:20px}
.lock-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Heebo',sans-serif;font-size:18px;text-align:center;letter-spacing:6px;outline:none;transition:.2s}
.lock-box input:focus{border-color:var(--accent)}
.lock-btn{width:100%;margin-top:14px;background:var(--accent);border:none;border-radius:12px;padding:14px;color:#fff;font-family:'Heebo',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:.2s}
.lock-btn:active{transform:scale(.97)}
.lock-err{color:var(--danger);font-size:12px;margin-top:8px;min-height:18px}
.lock-hint{color:var(--muted);font-size:12px}

/* ── APP LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOP HEADER ── */
.top-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:10}
.top-header .th-title{font-size:17px;font-weight:800;flex:1}
.top-header .th-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-header .th-actions{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:7px 10px;color:var(--muted);cursor:pointer;font-size:15px;transition:.2s;display:flex;align-items:center;justify-content:center}
.icon-btn:active{transform:scale(.93)}

/* ── MAIN CONTENT ── */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.page{flex:1;overflow-y:auto;display:none;flex-direction:column;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 20px)}.page.active{display:flex}

/* ── BOTTOM NAV ── */
.bottom-nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;flex-shrink:0;padding-bottom:max(env(safe-area-inset-bottom),16px)}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 16px;border-radius:12px;cursor:pointer;transition:.2s;position:relative;border:none;background:none;color:var(--muted);font-family:'Heebo',sans-serif;min-width:60px}
.bn-item:active{transform:scale(.9)}
.bn-item.active{color:var(--accent)}
.bn-item .bn-icon{font-size:20px;line-height:1}
.bn-item .bn-label{font-size:10px;font-weight:700}
.bn-badge{position:absolute;top:4px;right:10px;background:var(--danger);color:#fff;font-size:9px;border-radius:8px;padding:1px 5px;font-weight:800}

/* ── HOME ── */
.home-greeting{padding:20px 16px 8px}
.home-greeting h2{font-size:24px;font-weight:900}
.home-greeting p{color:var(--muted);font-size:13px;margin-top:3px}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:.2s;active:transform:scale(.97)}
.stat-card:active{transform:scale(.97)}
.sc-icon{font-size:20px;margin-bottom:6px}
.sc-val{font-size:28px;font-weight:900}
.sc-label{font-size:11px;color:var(--muted);margin-top:1px}
.stat-card.danger .sc-val{color:var(--danger)}
.stat-card.warning .sc-val{color:var(--warning)}
.stat-card.success .sc-val{color:var(--success)}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin:8px 16px;overflow:hidden}
.sc-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sc-head h3{font-size:14px;font-weight:700}
.sc-body{padding:8px}
.mini-task{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:.15s;border:1px solid transparent}
.mini-task:active{background:var(--surface2)}
.mini-task.overdue{background:rgba(255,71,87,.06);border-color:rgba(255,71,87,.2)}
.mt-check{width:20px;height:20px;min-width:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:.2s}
.mt-check.done{background:var(--success);border-color:var(--success)}
.mt-check.done::after{content:'✓';color:#000;font-size:11px;font-weight:900}
.mt-info{flex:1;min-width:0}
.mt-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt-client{font-size:11px;color:var(--muted)}
.mt-date{font-size:11px;font-weight:700;white-space:nowrap}
.mt-date.late{color:var(--danger)}.mt-date.soon{color:var(--warning)}.mt-date.ok{color:var(--muted)}

/* ── CLIENTS LIST ── */
.search-bar{padding:12px 16px}
.search-bar input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 16px;color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;outline:none;transition:.2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--muted)}
.client-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s;background:var(--surface)}
.client-row:active{background:var(--surface2)}
.cr-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;min-width:42px}
.cr-info{flex:1;min-width:0}
.cr-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.cr-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-badge{background:var(--danger);color:#fff;font-size:9px;border-radius:8px;padding:1px 6px;font-weight:800}
.cr-arrow{color:var(--muted);font-size:16px}
.add-fab{position:fixed;bottom:calc(var(--nav-h) + 16px);left:16px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(108,99,255,.4);z-index:50;transition:.2s}
.add-fab:active{transform:scale(.9)}

/* ── CLIENT DETAIL ── */
.client-detail-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px}
.cdh-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cdh-back{background:none;border:none;color:var(--accent);font-size:20px;cursor:pointer;padding:4px;font-family:'Heebo',sans-serif;font-weight:700;display:flex;align-items:center;gap:4px;font-size:14px}
.cdh-avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;min-width:48px}
.cdh-name{font-size:18px;font-weight:800}
.cdh-sub{font-size:12px;color:var(--muted);margin-top:2px}
.cdh-actions{display:flex;gap:8px;flex-wrap:wrap}
.contact-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:.2s;border:none;font-family:'Heebo',sans-serif}
.contact-btn:active{transform:scale(.95)}
.wa-btn{background:rgba(37,211,102,.15);color:#25d366;border:1px solid rgba(37,211,102,.3)}
.call-btn{background:rgba(46,213,115,.15);color:var(--success);border:1px solid rgba(46,213,115,.3)}
.email-btn{background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3)}
/* DETAIL TABS */
.detail-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.detail-tabs::-webkit-scrollbar{display:none}
.dt-btn{padding:12px 16px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:.2s}
.dt-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.detail-content{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}

/* ── ALL TASKS ── */
.at-head{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.at-head h2{font-size:20px;font-weight:900}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-head h3{font-size:14px;font-weight:700}

/* ── TAGS ── */
.tags-wrap{display:flex;flex-wrap:wrap;gap:7px;padding:4px 0}
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.3);color:var(--accent);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600}
.tag .x{cursor:pointer;color:var(--muted);font-size:15px}

/* ── TASKS ── */
.task-filters{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.task-filters::-webkit-scrollbar{display:none}
.tf-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s}
.tf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.task-item.overdue{border-color:rgba(255,71,87,.4);background:rgba(255,71,87,.04)}
.task-item.done{opacity:.4}
.task-check{width:22px;height:22px;min-width:22px;border-radius:7px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:1px}
.task-check.checked{background:var(--success);border-color:var(--success)}
.task-check.checked::after{content:'✓';color:#000;font-size:12px;font-weight:900}
.task-body{flex:1;min-width:0}
.t-title{font-size:13px;font-weight:700}
.task-item.done .t-title{text-decoration:line-through}
.t-desc{font-size:12px;color:var(--muted);margin-top:3px}
.t-due{font-size:11px;margin-top:5px;font-weight:700}
.t-due.late{color:var(--danger)}.t-due.soon{color:var(--warning)}.t-due.ok{color:var(--muted)}
.t-pri{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:7px;margin-left:5px}
.t-pri.high{background:rgba(255,71,87,.2);color:var(--danger)}
.t-pri.mid{background:rgba(255,165,2,.2);color:var(--warning)}
.t-pri.low{background:rgba(46,213,115,.15);color:var(--success)}
.task-acts{display:flex;gap:4px}

/* ── SUMMARIES ── */
.sum-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.sum-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sum-title{font-size:14px;font-weight:700}
.sum-date{font-size:11px;color:var(--muted);margin-top:2px}
.sum-body{font-size:13px;color:var(--muted);line-height:1.7;white-space:pre-wrap}

/* ── CREDS ── */
.cred-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.cred-service{font-size:14px;font-weight:700;margin-bottom:8px}
.cred-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(42,47,69,.4);font-size:13px}
.cred-row:last-child{border-bottom:none}
.cred-label{color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.cred-val{font-family:monospace;font-size:13px}
.cred-acts{display:flex;gap:6px;margin-top:10px}

/* ── BUTTONS ── */
.btn{padding:8px 14px;border-radius:10px;border:none;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:rgba(255,71,87,.15);color:var(--danger);border:1px solid rgba(255,71,87,.3)}
.btn-danger:active{background:var(--danger);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:4px 8px;font-size:11px}
.btn-full{width:100%;justify-content:center;padding:13px}

/* ── FILES ── */
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;color:var(--muted);cursor:pointer;transition:.2s;margin-bottom:12px}
.drop-zone:active{border-color:var(--accent);color:var(--accent)}
.file-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border-radius:10px;margin-bottom:8px;border:1px solid var(--border)}
.file-icon{font-size:26px;min-width:30px;text-align:center}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-date{font-size:11px;color:var(--muted);margin-top:2px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:500;animation:fi .15s ease}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:su .25s ease;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal h2{font-size:18px;font-weight:800;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:15px;outline:none;transition:.2s;direction:rtl;-webkit-appearance:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:none;min-height:100px}
.pw-wrap{position:relative}.pw-wrap input{padding-left:44px}
.pw-eye{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0}
.modal-foot{display:flex;gap:8px;margin-top:16px}
.modal-foot .btn{flex:1;justify-content:center}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ── MISC ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.empty .ei{font-size:42px;margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:12px 0}
::-webkit-scrollbar{display:none}
.hidden{display:none!important}
input[type=text],input[type=email],input[type=password],input[type=date],input[type=number],textarea,select{direction:rtl;text-align:right}
#fileInput,#importFile{display:none}
.loading{text-align:center;padding:40px;color:var(--muted)}
.sync-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:right;transition:.3s;z-index:1000}
.sync-bar.active{transform:scaleX(1)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ── DESKTOP OVERRIDES ── */
@media(min-width:768px){
  .app{flex-direction:row}
  .top-header{display:none}
  .bottom-nav{display:none}
  .sidebar-desktop{width:280px;min-width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex!important;flex-direction:column;height:100vh;overflow:hidden}
  .content{flex:1}
  .add-fab{display:none}
  .overlay{align-items:center}
  .modal{border-radius:20px;max-width:480px;max-height:85vh;padding-bottom:24px}
  @keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .page{overflow-y:auto}
  .detail-tabs{overflow-x:auto}
}
@media(max-width:767px){
  .sidebar-desktop{display:none}
  .page-clients .client-list-wrap{background:var(--surface)}
}
</style>
</head>
<body>

<!-- SYNC BAR -->
<div class="sync-bar" id="syncBar"></div>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <h2>Mini-CRM</h2>
    <p>הזן סיסמה לכניסה</p>
    <input type="password" id="lockInput" placeholder="••••" onkeydown="if(event.key==='Enter')unlock()">
    <button class="lock-btn" onclick="unlock()">כניסה</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
  <div class="lock-hint">ברירת מחדל: <strong>1234</strong></div>
</div>

<!-- APP -->
<div class="app hidden" id="app">

  <!-- DESKTOP SIDEBAR -->
  <div class="sidebar-desktop">
    <div style="padding:20px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">⚡ Mini-CRM</div>
        <div style="font-size:11px;color:var(--muted)" id="sbDateD"></div>
      </div>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtnD">🌙</button>
    </div>
    <div style="padding:10px 12px;border-bottom:1px solid var(--border)">
      <input type="text" id="searchDesktop" placeholder="🔍 חיפוש..." oninput="filterClients(this.value)" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;outline:none;direction:rtl">
    </div>
    <button onclick="openClientModal()" style="margin:10px 12px;width:calc(100% - 24px);background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer">+ לקוח חדש</button>
    <div style="display:flex;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border)">
      <button class="tf-btn active" id="dSortName" onclick="setSortD('name',this)">א-ת</button>
      <button class="tf-btn" id="dSortRecent" onclick="setSortD('recent',this)">אחרונים</button>
      <button class="tf-btn" id="dSortTasks" onclick="setSortD('tasks',this)">משימות</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding:6px 8px" id="desktopClientList"></div>
    <div style="padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="showDesktopPage('home')">🏠</button>
      <button class="btn btn-ghost btn-sm" onclick="showDesktopPage('allTasks')">✅</button>

function renderHome(){
  const td=todayStr();
  const overdue=tasks.filter(t=>!t.done&&t.due_date&&t.due_date<td);
  const todayT=tasks.filter(t=>!t.done&&t.due_date===td);

    <div class="stat-card"><div class="sc-icon">👥</div><div class="sc-val">${clients.length}</div><div class="sc-label">לקוחות</div></div>

    <div class="stat-card"><div class="sc-icon">📋</div><div class="sc-val">${open.length}</div><div class="sc-label">פתוחות</div></div>`;
  const upcoming=[...overdue,...tasks.filter(t=>!t.done&&t.due_date&&t.due_date>=td)].sort((a,b)=>(a.due_date||'z').localeCompare(b.due_date||'z')).slice(0,8);

          <div class="mt-date ${ov?'late':isT?'soon':'ok'}">${dl}</div>
        </div>`;}).join(''):'<div class="empty"><div class="ei">🎉</div>אין משימות!</div>'}</div>
    </div>`;
}

async function quickToggle(id,done){
  await sb.from('tasks').update({done:!done}).eq('id',id);

  renderHome();updateOverdueBadge();
}

// ══ ALL TASKS ══
function renderAllTasks(){
  const td=todayStr();
  const groups={overdue:[],today:[],week:[],future:[],done:[]};
  tasks.forEach(t=>{
    const c=clients.find(x=>x.id===t.client_id);t._cn=c?.name||'';
    if(t.done){groups.done.push(t);return}
    if(!t.due_date){groups.future.push(t);return}
    if(t.due_date<td)groups.overdue.push(t);
    else if(t.due_date===td)groups.today.push(t);
    else if(daysDiff(t.due_date,td)<=7)groups.week.push(t);
    else groups.future.push(t);
  });
  const secs=[{l:'⚠️ באיחור',items:groups.overdue},{l:'📅 היום',items:groups.today},{l:'📆 השבוע',items:groups.week},{l:'🔮 עתידי',items:groups.future},{l:'✅ הושלמו',items:groups.done.slice(-15).reverse()}];
  document.getElementById('allTasksContent').innerHTML=secs.filter(s=>s.items.length).map(s=>`
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${s.l} (${s.items.length})</div>
      ${s.items.map(t=>{const ov=!t.done&&t.due_date&&t.due_date<td;return`
        <div class="task-item ${ov?'overdue':''} ${t.done?'done':''}">
          <div class="task-check ${t.done?'checked':''}" onclick="quickToggle('${t.id}',${t.done});setTimeout(renderAllTasks,300)"></div>
          <div class="task-body">
            <div class="t-title">${esc(t.title)} <span style="font-size:11px;color:var(--muted);font-weight:400">— ${esc(t._cn)}</span></div>
            ${t.description?`<div class="t-desc">${esc(t.description)}</div>`:''}
            ${t.due_date?`<div class="t-due ${ov?'late':t.due_date===td?'soon':'ok'}">${formatDate(t.due_date)}</div>`:''}
          </div>
          <button class="btn btn-ghost btn-xs" onclick="openClientDetail('${t.client_id}')">פתח</button>
        </div>`;}).join('')}
    </div>`).join('')||'<div class="empty"><div class="ei">🎉</div>אין משימות!</div>';
}

}

}
function togglePw(id,ep){const el=document.getElementById('pw_'+id);if(el.dataset.s==='1'){el.textContent='••••••••';el.dataset.s='0';return}el.textContent=dec(decodeURIComponent(ep))||'(ריק)';el.dataset.s='1'}
function copyPw(ep){navigator.clipboard?.writeText(dec(decodeURIComponent(ep)));showToast('📋 הועתק!')}
function openCredModal(id=null){
  showModal(id?'עריכת גישה':'גישה חדשה',`
    <div class="form-group"><label>שירות *</label><input type="text" id="cs" placeholder="Gmail, Facebook..."></div>
    <div class="form-group"><label>שם משתמש</label><input type="text" id="cu"></div>
    <div class="form-group"><label>סיסמה</label><div class="pw-wrap"><input type="password" id="cp"><button type="button" class="pw-eye" onclick="togglePwInput('cp')">👁️</button></div></div>
    <div class="form-group"><label>קישור</label><input type="text" id="curl" placeholder="https://..."></div>
  `,[{label:'ביטול',cls:'btn btn-ghost',fn:closeModal},{label:'שמור',cls:'btn btn-primary',fn:()=>saveCred(id)}]);
  if(id)sb.from('credentials').select('*').eq('id',id).single().then(({data:c})=>{if(c){document.getElementById('cs').value=c.service||'';document.getElementById('cu').value=c.username||'';document.getElementById('cp').value=dec(c.password)||'';document.getElementById('curl').value=c.url||''}});
}
function togglePwInput(id){const e=document.getElementById(id);e.type=e.type==='password'?'text':'password'}
async function saveCred(id){
  const s=gv('cs').trim();if(!s){alert('יש להזין שירות');return}
  syncStart();
  const obj={client_id:currentClientId,service:s,username:gv('cu'),password:enc(gv('cp')),url:gv('curl')};
  if(id)await sb.from('credentials').update(obj).eq('id',id);
  else await sb.from('credentials').insert(obj);
  syncEnd();closeModal();loadDetailTab('creds');
}
async function deleteCred(id){if(!confirm('למחוק?'))return;syncStart();await sb.from('credentials').delete().eq('id',id);syncEnd();loadDetailTab('creds')}

// ══ KEYWORDS ══
async function buildKeywords(){
  const {data:kws}=await sb.from('keywords').select('*').eq('client_id',currentClientId);
  return`<div class="card"><div class="card-head"><h3>🏷️ תגיות</h3></div>
  <div class="tags-wrap">${kws?.map(k=>`<span class="tag">${esc(k.word)}<span class="x" onclick="deleteKw('${k.id}')">×</span></span>`).join('')||'<span style="color:var(--muted)">אין תגיות</span>'}</div>
  <div style="display:flex;gap:8px;margin-top:14px">
    <input type="text" id="kwi" placeholder="הוסף תגית..." style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;outline:none" onkeydown="if(event.key==='Enter')addKw()">
    <button class="btn btn-primary" onclick="addKw()">+</button>
  </div></div>`;
}
async function addKw(){const v=document.getElementById('kwi')?.value.trim();if(!v)return;syncStart();await sb.from('keywords').insert({client_id:currentClientId,word:v});syncEnd();loadDetailTab('keywords')}
async function deleteKw(id){await sb.from('keywords').delete().eq('id',id);loadDetailTab('keywords')}

// ══ FILES ══
async function buildFiles(){
  const {data:files}=await sb.from('files').select('*').eq('client_id',currentClientId);
  const icons={pdf:'📄',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',zip:'📦',mp4:'🎬',mp3:'🎵'};
  return`<div class="drop-zone" onclick="document.getElementById('fileInput').click()"><div style="font-size:32px;margin-bottom:8px">📎</div><div style="font-weight:600">לחץ להעלאת קבצים</div></div>
  ${files?.map(f=>{const ext=(f.name||'').split('.').pop().toLowerCase();return`<div class="file-item"><div class="file-icon">${icons[ext]||'📄'}</div><div class="file-info"><div class="file-name">${esc(f.name)}</div><div class="file-date">${f.uploaded_at||''}</div></div><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-xs" onclick="downloadFile('${f.id}','${esc(f.name)}')">⬇️</button><button class="btn btn-danger btn-xs" onclick="deleteFile('${f.id}')">🗑️</button></div></div>`;}).join('')||''}
  ${!files?.length?'<div class="empty"><div class="ei">📁</div>אין קבצים</div>':''}`;
}
async function handleFileUpload(input){
  const files=Array.from(input.files);
  for(const file of files){syncStart();const r=new FileReader();r.onload=async e=>{await sb.from('files').insert({client_id:currentClientId,name:file.name,data:e.target.result,uploaded_at:nowStr()});syncEnd();loadDetailTab('files')};r.readAsDataURL(file)}
  input.value='';
}
async function downloadFile(id,name){const {data}=await sb.from('files').select('data').eq('id',id).single();if(data?.data){const a=document.createElement('a');a.href=data.data;a.download=name;a.click()}}
async function deleteFile(id){if(!confirm('למחוק?'))return;await sb.from('files').delete().eq('id',id);loadDetailTab('files')}

// ══ SUMMARIES ══
async function buildSummaries(){
  const {data:sums}=await sb.from('summaries').select('*').eq('client_id',currentClientId).order('created_at',{ascending:false});
  return`<button class="btn btn-primary btn-full" onclick="openSummaryModal()" style="margin-bottom:14px">+ סיכום חדש</button>
  ${sums?.map(s=>`<div class="sum-item"><div class="sum-head"><div><div class="sum-title">${esc(s.title||'ללא כותרת')}</div><div class="sum-date">📅 ${s.created_at}</div></div><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-xs" onclick="openSummaryModal('${s.id}','${encodeURIComponent(s.title||'')}','${encodeURIComponent(s.content||'')}')">✏️</button><button class="btn btn-danger btn-xs" onclick="deleteSummary('${s.id}')">🗑️</button></div></div><div class="sum-body">${esc(s.content)}</div></div>`).join('')||''}
  ${!sums?.length?'<div class="empty"><div class="ei">📝</div>אין סיכומים</div>':''}`;
}
function openSummaryModal(id=null,te='',ce=''){
  showModal(id?'עריכת סיכום':'סיכום חדש',`
    <div class="form-group"><label>כותרת</label><input type="text" id="sti" value="${esc(id?decodeURIComponent(te):'')}"></div>
    <div class="form-group"><label>תוכן *</label><textarea id="stc">${esc(id?decodeURIComponent(ce):'')}</textarea></div>
  `,[{label:'ביטול',cls:'btn btn-ghost',fn:closeModal},{label:'שמור',cls:'btn btn-primary',fn:()=>saveSummary(id)}]);
}
async function saveSummary(id){
  const c=gv('stc').trim();if(!c){alert('יש להזין תוכן');return}
  syncStart();
  const obj={client_id:currentClientId,title:gv('sti'),content:c,created_at:nowStr()};
  if(id)await sb.from('summaries').update(obj).eq('id',id);else await sb.from('summaries').insert(obj);
  syncEnd();closeModal();loadDetailTab('summaries');
}
async function deleteSummary(id){if(!confirm('למחוק?'))return;await sb.from('summaries').delete().eq('id',id);loadDetailTab('summaries')}

// ══ TASKS ══
async function buildTasks(){
  const {data:ct}=await sb.from('tasks').select('*').eq('client_id',currentClientId);
  const td=todayStr();
  let filtered=ct||[];
  if(taskFilter==='open')filtered=filtered.filter(t=>!t.done);
  else if(taskFilter==='done')filtered=filtered.filter(t=>t.done);
  filtered.sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return(a.due_date||'z').localeCompare(b.due_date||'z')});
  const pm={high:'גבוהה',mid:'בינונית',low:'נמוכה'};
  return`<button class="btn btn-primary btn-full" onclick="openTaskModal()" style="margin-bottom:14px">+ משימה חדשה</button>
  <div class="task-filters">
    <button class="tf-btn ${taskFilter==='all'?'active':''}" onclick="taskFilter='all';loadDetailTab('tasks')">הכל</button>
    <button class="tf-btn ${taskFilter==='open'?'active':''}" onclick="taskFilter='open';loadDetailTab('tasks')">פתוחות</button>
    <button class="tf-btn ${taskFilter==='done'?'active':''}" onclick="taskFilter='done';loadDetailTab('tasks')">הושלמו</button>
  </div>
  ${filtered.map(t=>{const ov=!t.done&&t.due_date&&t.due_date<td,isT=t.due_date===td;return`
    <div class="task-item ${ov?'overdue':''} ${t.done?'done':''}">
      <div class="task-check ${t.done?'checked':''}" onclick="toggleDetailTask('${t.id}',${t.done})"></div>
      <div class="task-body">
        <div class="t-title">${t.priority?`<span class="t-pri ${t.priority}">${pm[t.priority]||''}</span>`:''} ${esc(t.title)}</div>
        ${t.description?`<div class="t-desc">${esc(t.description)}</div>`:''}
        ${t.due_date?`<div class="t-due ${ov?'late':isT?'soon':'ok'}">${ov?'⚠️ ':isT?'📅 ':'📅 '}${formatDate(t.due_date)}</div>`:''}
      </div>
      <div class="task-acts">
        <button class="btn btn-ghost btn-xs" onclick="openTaskModal('${t.id}')">✏️</button>
        <button class="btn btn-danger btn-xs" onclick="deleteTask('${t.id}')">🗑️</button>
      </div>
    </div>`;}).join('')}
  ${!filtered.length?'<div class="empty"><div class="ei">✅</div>אין משימות</div>':''}`;
}
async function toggleDetailTask(id,done){
  syncStart();await sb.from('tasks').update({done:!done}).eq('id',id);
  const t=tasks.find(x=>x.id===id);if(t)t.done=!done;
  syncEnd();loadDetailTab('tasks');updateOverdueBadge();
}
function openTaskModal(id=null){
  showModal(id?'עריכת משימה':'משימה חדשה',`
    <div class="form-group"><label>כותרת *</label><input type="text" id="tt"></div>
    <div class="form-group"><label>תיאור</label><input type="text" id="td2"></div>
    <div class="form-row">
      <div class="form-group"><label>תאריך יעד</label><input type="date" id="tdue"></div>
      <div class="form-group"><label>עדיפות</label><select id="tpri"><option value="">ללא</option><option value="high">🔴 גבוהה</option><option value="mid">🟡 בינונית</option><option value="low">🟢 נמוכה</option></select></div>
    </div>
  `,[{label:'ביטול',cls:'btn btn-ghost',fn:closeModal},{label:'שמור',cls:'btn btn-primary',fn:()=>saveTask(id)}]);
  if(id)sb.from('tasks').select('*').eq('id',id).single().then(({data:t})=>{if(t){document.getElementById('tt').value=t.title||'';document.getElementById('td2').value=t.description||'';document.getElementById('tdue').value=t.due_date||'';document.getElementById('tpri').value=t.priority||''}});
}
async function saveTask(id){
  const title=gv('tt').trim();if(!title){alert('יש להזין כותרת');return}
  syncStart();
  const obj={client_id:currentClientId,title,description:gv('td2'),due_date:gv('tdue')||null,priority:gv('tpri')};
  if(id){await sb.from('tasks').update(obj).eq('id',id);const i=tasks.findIndex(x=>x.id===id);if(i>=0)tasks[i]={...tasks[i],...obj}}
  else{const{data}=await sb.from('tasks').insert({...obj,done:false,created_at:new Date().toISOString()}).select().single();if(data)tasks.push(data)}
  syncEnd();closeModal();loadDetailTab('tasks');updateOverdueBadge();
}
async function deleteTask(id){if(!confirm('למחוק?'))return;syncStart();await sb.from('tasks').delete().eq('id',id);tasks=tasks.filter(x=>x.id!==id);syncEnd();loadDetailTab('tasks');updateOverdueBadge()}

// ══ HISTORY ══
async function buildHistory(){
  const {data:logs}=await sb.from('activity').select('*').eq('client_id',currentClientId).order('id',{ascending:false}).limit(20);
  const c=clients.find(x=>x.id===currentClientId);
  return`<div class="card"><div class="card-head"><h3>🕐 היסטוריה</h3></div>
  ${c?`<div style="font-size:12px;color:var(--muted);margin-bottom:10px">נוצר: ${c.created_at||'-'}</div>`:''}
  ${logs?.map(l=>`<div style="display:flex;gap:9px;padding:8px 0;border-bottom:1px solid rgba(42,47,69,.4);font-size:12px"><div style="width:7px;height:7px;border-radius:50%;background:var(--accent);margin-top:4px;min-width:7px"></div><span style="flex:1;color:var(--muted)">${esc(l.action)}</span><span style="font-size:10px;color:var(--muted)">${l.time}</span></div>`).join('')||'<div class="empty">אין היסטוריה</div>'}</div>`;
}

// ══ CLIENT CRUD ══
function openClientModal(id=null){
  const c=id?clients.find(x=>x.id===id):null;
  showModal(id?'עריכת לקוח':'לקוח חדש',`
    <div class="form-row"><div class="form-group"><label>שם מלא *</label><input type="text" id="fn" value="${esc(c?.name||'')}"></div><div class="form-group"><label>חברה</label><input type="text" id="fco" value="${esc(c?.company||'')}"></div></div>
    <div class="form-row"><div class="form-group"><label>אימייל</label><input type="text" id="fe" value="${esc(c?.email||'')}"></div><div class="form-group"><label>טלפון</label><input type="text" id="fp" value="${esc(c?.phone||'')}"></div></div>
    <div class="form-group"><label>סטטוס</label><select id="fst"><option value="active" ${(c?.status||'active')==='active'?'selected':''}>פעיל</option><option value="lead" ${c?.status==='lead'?'selected':''}>ליד</option><option value="inactive" ${c?.status==='inactive'?'selected':''}>לא פעיל</option></select></div>
    <div class="form-group"><label>הערות</label><textarea id="fno">${esc(c?.notes||'')}</textarea></div>
  `,[{label:'ביטול',cls:'btn btn-ghost',fn:closeModal},{label:'שמור',cls:'btn btn-primary',fn:()=>saveClient(id)}]);
}
async function saveClient(id){
  const name=gv('fn').trim();if(!name){alert('יש להזין שם');return}
  syncStart();
  const obj={name,email:gv('fe'),phone:gv('fp'),company:gv('fco'),notes:gv('fno'),status:gv('fst'),updated_at:new Date().toISOString()};
  if(id){await sb.from('clients').update(obj).eq('id',id);const i=clients.findIndex(x=>x.id===id);if(i>=0){clients[i]={...clients[i],...obj};renderDetailHeader(clients[i])}}
  else{const{data}=await sb.from('clients').insert({...obj,created_at:new Date().toISOString()}).select().single();if(data)clients.push(data)}
  syncEnd();closeModal();renderClientList();renderDesktopList();renderHome();
}
async function deleteClient(id){
  const c=clients.find(x=>x.id===id);if(!c)return;
  if(!confirm(`למחוק "${c.name}"?`))return;
  syncStart();await sb.from('clients').delete().eq('id',id);
  clients=clients.filter(x=>x.id!==id);tasks=tasks.filter(x=>x.client_id!==id);
  syncEnd();currentClientId=null;
  const isMobile=window.innerWidth<768;
  if(isMobile)showMobilePage('clients',document.getElementById('bnClients'));
  else showDesktopPage('home');
  renderClientList();renderDesktopList();renderHome();updateOverdueBadge();
}

// ══ SETTINGS ══
function openSettings(){
  showModal('⚙️ הגדרות',`
    <div class="form-group"><label>שינוי סיסמה</label><input type="password" id="sp1" placeholder="סיסמה חדשה"></div>
    <div class="form-group"><input type="password" id="sp2" placeholder="אמת סיסמה"></div>
    <div class="divider"></div>
    <div style="font-size:13px;color:var(--muted);line-height:1.8">
      ☁️ מחובר ל-Supabase<br>
      👥 ${clients.length} לקוחות · ✅ ${tasks.length} משימות
    </div>
    <div class="divider"></div>
    <button class="btn btn-ghost btn-full" onclick="exportBackup()">📦 ייצוא גיבוי JSON</button>
  `,[{label:'סגור',cls:'btn btn-ghost',fn:closeModal},{label:'שמור סיסמה',cls:'btn btn-primary',fn:saveSettings}]);
}
function saveSettings(){const p1=gv('sp1'),p2=gv('sp2');if(p1){if(p1!==p2){alert('הסיסמאות לא תואמות');return}setPass(p1)}closeModal();showToast('✅ נשמר!')}

async function exportBackup(){
  const [c,cr,kw,su,ta]=await Promise.all([sb.from('clients').select('*'),sb.from('credentials').select('*'),sb.from('keywords').select('*'),sb.from('summaries').select('*'),sb.from('tasks').select('*')]);
  const d=JSON.stringify({clients:c.data,credentials:cr.data,keywords:kw.data,summaries:su.data,tasks:ta.data,exportedAt:nowStr()},null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'application/json'}));a.download=`minicrm_${new Date().toISOString().slice(0,10)}.json`;a.click();showToast('📦 גיבוי הורד!');
}

// ══ MODAL ══
function showModal(title,body,buttons){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  const foot=document.getElementById('modalFoot');foot.innerHTML='';
  buttons.forEach(b=>{const btn=document.createElement('button');btn.className=b.cls;btn.textContent=b.label;btn.onclick=b.fn;foot.appendChild(btn)});
  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(()=>{const f=document.querySelector('#modalBody input,#modalBody textarea,#modalBody select');if(f)f.focus()},100);
}
function closeModal(){document.getElementById('overlay').classList.add('hidden')}
function closeModalOutside(e){if(e.target===document.getElementById('overlay'))closeModal()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ══ TOAST ══
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-weight:700;font-size:13px;z-index:9000;opacity:0;transition:.3s;font-family:Heebo,sans-serif;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3)';document.body.appendChild(t)}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2200);
}
</script>
